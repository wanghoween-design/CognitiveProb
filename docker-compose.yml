
services:
  # ====== PostgreSQL ======
  postgres:
    image: postgres:16
    container_name: cognitive_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: cognitive_probe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ====== Redis ======
  redis:
    image: redis:7
    container_name: cognitive_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ====== CognitiveProbe 主服务 ======
  cognitiveprobe:
    build: .
    container_name: cognitiveprobe
    ports:
      - "8000:8000"    # FastAPI
      - "8501:8501"    # Streamlit
    volumes:
      - ./models:/app/models           # 模型目录（需要预先下载）
      - ./adapters_4090:/app/adapters_4090  # 4090 训练的 adapter
      - ./data:/app/data               # 训练数据
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - COGNITIVEPROBE_MOCK_LLM=0     # 0=正常模式，1=mock模式
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
